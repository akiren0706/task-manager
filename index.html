function buildModal(){
  if(!st.modal)return'<div class="moverlay" id="moverlay"></div>';
  if(st.modalType==='import')return buildImportModal();
  if(st.modalType==='export')return buildExportModal();
  return buildTaskModal();
}

function openModal(id){
  // 閲覧者は新規作成不可、既存タスク閲覧は可
  if(authRole==='viewer'&&!id) return;
  st.eid=id;st.modal=true;st.modalType='task';
  st.newSubInput='';
  // 新規作成時は一時IDを生成（添付・コメント用）
  if(!id) st.tempId = 'temp_' + Date.now();
  const task=id?tasks.find(t=>t.id===id):null;
  
  st.form = task ? {
    title: task.title, priority: task.priority, assignee: task.assignee,
    start: task.start, end: task.end, tags: [...task.tags], progress: task.progress,
    factory: task.factory || '合板工場',
    subtasks: deep(task.subtasks || [])
  } : {
    title: '', priority: 'high', assignee: '', start: fd(new Date()), end: fd(new Date()), tags: [], progress: 0,
    factory: '合板工場',
    subtasks: []
  };
  render();
  setTimeout(()=>document.getElementById('f-title')?.focus(),50);
}

function recalcFormProgress() {
  if (st.form.subtasks && st.form.subtasks.length > 0) {
    const doneCount = st.form.subtasks.filter(s => s.done).length;
    st.form.progress = Math.round((doneCount / st.form.subtasks.length) * 100);
  }
}

function addModalSub() {
  const title = (st.newSubInput||'').trim();
  if(!title) { document.getElementById('new-sub')?.focus(); return; }
  st.form.subtasks.push({
    id: Date.now(), title, progress: 0, done: false,
    start: st.form.start || fd(new Date()), end: st.form.end || fd(new Date())
  });
  st.newSubInput = '';
  recalcFormProgress();
  render();
  setTimeout(()=>document.getElementById('new-sub')?.focus(),50);
}
function toggleModalSub(idx) {
  const s = st.form.subtasks[idx];
  s.done = !s.done;
  s.progress = s.done ? 100 : 0;
  recalcFormProgress();
  render();
}
function deleteModalSub(idx) {
  st.form.subtasks.splice(idx, 1);
  recalcFormProgress();
  render();
}
function updateSubDate(idx, field, val){
  if(st.form.subtasks[idx]) st.form.subtasks[idx][field] = val;
}

      ${!isViewer?`<button onclick="deleteModalSub(${idx})" class="btn-del" style="margin-left:4px;padding:4px 8px;border:none;background:transparent;color:var(--muted);font-size:14px;" title="${t('btn_del')}">✕</button>`:''}

        <span style="font-weight:600;">${t('l_ed')}:</span>

  </div>`).join('');

  const secOpen=k=>st.expandedSecs[k]!==false;

  return`<div class="moverlay on" id="moverlay" onclick="maybeClose(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="mhdr">

        <button class="mclose" onclick="closeModal()">✕</button>
      </div>

          <input class="fi2" id="f-title" value="${ea(f.title||'')}" placeholder="${t('ph_name')}" oninput="sf('title',this.value)" ${isViewer?'readonly style="background:var(--bg);cursor:default"':''}>
        </div>

        <div class="fg">

            <label><input type="radio" name="factory" value="合板工場" ${f.factory==='合板工場'?'checked':''} onchange="sf('factory',this.value)" ${isViewer?'disabled':''}> ${t('f_ply')}</label>

function buildImportModal(){

  const dupItems=prev.filter(r=>r._dup);

  const previewHTML=prev.length?`<div class="fg" style="margin-top:16px">
    <label class="flbl" style="margin-bottom:8px;display:block;">
      ${st.lang==='ru'?`Новых: <strong style="color:var(--low)">${newItems.length}</strong>　Дублей: <strong style="color:var(--muted)">${dupItems.length}</strong>`
        :`新規追加: <strong style="color:var(--low)">${newItems.length}件</strong>　重複スキップ: <strong style="color:var(--muted)">${dupItems.length}件</strong>`}
    </label>
    <div style="border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;background:var(--surface)">
      ${newItems.map((r,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border-light);font-size:12px">
          <span style="width:16px;color:var(--low);font-weight:800;flex-shrink:0">＋</span>
          <span style="flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.title)}</span>
          <span class="pbadge ${pclass(r.priority)}">${plabel(r.priority)}</span>
          <span style="font-size:10px;color:var(--muted);white-space:nowrap">${r.start}</span>
        </div>`).join('')}
      ${dupItems.map(r=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border-light);font-size:12px;opacity:.45;">
          <span style="width:16px;color:var(--muted);font-weight:800;flex-shrink:0">＝</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:line-through">${esc(r.title)}</span>

        ${st.importTab==='file'?`
        <div style="background:var(--primary-bg);border:2px dashed var(--primary);border-radius:12px;padding:24px;text-align:center;cursor:pointer;" id="drop-zone">

        </div>`:`

          <textarea class="fi2" rows="6" style="font-family:monospace;resize:vertical" id="import-text"
            placeholder="${t('i_ph')}"

        </div>`}
        ${previewHTML}
      </div>
      <div class="mftr">
        ${prev.length?`<button class="btn-s" onclick="clearImportPreview()">${t('b_clr')}</button>`:''}
        <button class="btn-s" onclick="closeModal()">${t('btn_can')}</button>
        ${st.importTab==='text'&&newItems.length?`<button class="btn-blue" onclick="confirmImport()">${t('b_add', newItems.length)}</button>`:''}
      </div>
    </div>
  </div>`;
}

  return`<div class="moverlay on" id="moverlay" onclick="maybeClose(event)">
    <div class="modal" onclick="event.stopPropagation()">

function saveTask(){
  const f=st.form;
  if(!String(f.title||'').trim()){alert(t('al_nam'));return;}
  if(f.start&&f.end&&pd(f.start)>pd(f.end)){alert(t('al_dat'));return;}
  const tags=Array.isArray(f.tags)?f.tags:String(f.tags||'').split(',').map(s=>s.trim()).filter(Boolean);
  
  if(st.eid){
    const tk=tasks.find(tx=>tx.id===st.eid);
    if(tk) Object.assign(tk,{
      title:f.title.trim(), factory:f.factory, priority:f.priority, assignee:f.assignee,
      start:f.start, end:f.end, tags, progress:f.progress, subtasks:f.subtasks
    });
  }else{
    if(st.newSubInput.trim()){
      f.subtasks.push({id:Date.now(),title:st.newSubInput.trim(),progress:0,done:false,start:f.start,end:f.end});
      recalcFormProgress();
    }
    const newId = nextId();
    // 一時IDの添付・コメントを正式IDに移行
    if(st.tempId){
      if(attachments[st.tempId]){ attachments[newId]=attachments[st.tempId]; delete attachments[st.tempId]; saveAttachments(); }
      if(comments[st.tempId]){ comments[newId]=comments[st.tempId]; delete comments[st.tempId]; saveComments(); }
      st.tempId = null;
    }
    tasks.push({
      id:newId, title:f.title.trim(), factory:f.factory, priority:f.priority||'high', assignee:f.assignee,
      start:f.start, end:f.end, tags, progress:f.progress||0,
      color:taskColor(tags,tasks.length), exp:false, subtasks:f.subtasks
    });
  }
  st.modal=false;save();render();
}

function handleFile(file){
  if(!file)return;
  const name=file.name.toLowerCase();
  const reader=new FileReader();
  if(name.endsWith('.csv')){reader.onload=e=>parseCSV(e.target.result);reader.readAsText(file,'UTF-8');}
  else{reader.onload=e=>parseXLSX(e.target.result);reader.readAsArrayBuffer(file);}
}
function parseXLSX(buf){
  try{
    const wb=XLSX.read(buf,{type:'array'});
    let bestSheet=wb.SheetNames[0],bestCount=0;
    for(const sn of wb.SheetNames){
      const ws=wb.Sheets[sn];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length>bestCount){bestCount=rows.length;bestSheet=sn;}
    }
    const ws=wb.Sheets[bestSheet];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    processRows(rows);
  }catch(e){alert('Error: '+e.message);}
}
function parseCSV(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const rows=lines.map(l=>l.split(',').map(s=>s.trim()));
  processRows(rows);
}
function parseTextImport(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
  const items=lines.map(line=>{
    const p=line.split(',').map(s=>s.trim());
    if(!p[0])return null;
    const pr=p[4]||'';
    return{title:p[0],assignee:p[1]||'',start:p[2]||fd(new Date()),end:p[3]||fd(new Date()),
      priority:pr==='最優先'||pr==='Urgent'||pr==='Срочно'?'urgent':pr==='高'||pr==='High'||pr==='Высокий'?'high':pr==='低'||pr==='Low'||pr==='Низкий'?'low':'medium',tags:[p[5]||'タグ']};
  }).filter(Boolean);
  st.importPreview=groupImportItems(items);render();
}
function processRows(rows){
  if(rows.length<2){st.importPreview=[];render();return;}
  const hrow=rows[0].map(h=>String(h).toLowerCase());
  const ci={};
  const find=(names)=>{for(const n of names){const i=hrow.findIndex(h=>h.includes(n.toLowerCase()));if(i>=0)return i;}return -1;};
  ci.title=find(['件名','タスク名','title','название','таск']);
  ci.assignee=find(['担当','assignee','исполнитель']);
  ci.start=find(['初回','開始','start','начало']);
  ci.end=find(['最終','終了','end','конец','срок']);
  ci.priority=find(['優先','priority','приоритет']);
  ci.tag=find(['分類','タグ','tag','тег','категория']);
  ci.action=find(['指示','用件','アクション','action','действие']);

  const items=[];
  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    const get=k=>ci[k]>=0?String(row[ci[k]]||'').trim():'';
    const title=get('title');
    if(!title||title.length<1)continue;
    const start=parseXDate(ci.start>=0?row[ci.start]:null)||fd(new Date());
    const end=parseXDate(ci.end>=0?row[ci.end]:null)||start;
    const pr=get('priority');
    const prio=pr.includes('最優先')||pr.includes('Urgent')||pr.includes('Срочно')?'urgent':pr.includes('高')||pr.includes('High')||pr.includes('Высокий')?'high':pr.includes('低')||pr.includes('Low')||pr.includes('Низкий')?'low':'medium';
    const tagRaw=get('tag');
    const tags=tagRaw?tagRaw.split(/[\/,]/).map(s=>s.trim()).filter(Boolean):['その他'];
    items.push({title,assignee:get('assignee'),start,end,priority:prio,tags,_action:get('action')});
  }
  st.importPreview=groupImportItems(items);
  // ファイル読み込み後に自動実行
  confirmImport();
}
function groupImportItems(items){
  // ① インポートファイル内の重複を除去（完全一致のみ）
  // ② 既存タスクとの重複チェック（タスク名の完全一致）
  const result=[];
  let tmpId=1;
  const existingTitles = new Set(tasks.map(t=>t.title.trim()));
  const seenTitles = new Set();

  for(const item of items){
    const title = item.title.trim();
    if(!title) continue;
    // 既存タスクと重複 → _dupフラグを立てて記録（プレビューに表示するため）
    if(existingTitles.has(title)){
      item._tmpId=tmpId++;item._dup=true;result.push(item);continue;
    }
    // ファイル内の重複 → スキップ
    if(seenTitles.has(title)) continue;
    seenTitles.add(title);
    item._tmpId=tmpId++;
    result.push(item);
  }
  return result;
}
function parseXDate(val){
  if(!val)return null;
  if(typeof val==='number'&&val>1000){try{return fd(new Date(Math.round((val-25569)*86400*1000)));}catch(e){return null;}}
  const s=String(val);
  if(s.match(/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/))return s.replace(/\//g,'-').slice(0,10);
  return null;
}
function confirmImport(){
  // 重複でないタスクのみ自動追加
  const newItems = st.importPreview.filter(r=>!r._dup&&r.title);
  const dupCount = st.importPreview.filter(r=>r._dup).length;
  if(!newItems.length){
    save();st.modal=false;st.importPreview=[];render();
    setTimeout(()=>alert(t('imp_auto_none')),100);
    return;
  }
  let added=0;
  for(const r of newItems){
    const tags=Array.isArray(r.tags)?r.tags:['その他'];
    tasks.push({
      id:nextId(),title:r.title.trim(),factory:'合板工場',priority:r.priority||'medium',
      assignee:r.assignee||'',start:r.start,end:r.end,tags,progress:0,
      color:taskColor(tags,tasks.length),exp:false,subtasks:[]
    });
    added++;
  }
  save();st.modal=false;st.importPreview=[];render();
  setTimeout(()=>alert(t('imp_auto_done',added,dupCount)),100);
}

    title:'合板/単板工場 タスク管理', sub:'ログインしてください',
    admin:'管理者', admin_desc:'編集・追加・削除可能',
    viewer:'閲覧者', viewer_desc:'閲覧のみ',
    pw_label:'管理者パスワード', pw_ph:'パスワードを入力',
    submit_admin:'管理者としてログイン', submit_viewer:'閲覧モードで開く',
    err:'パスワードが違います', viewer_badge:'閲覧モード'
  },
  en: {
    title:'Plywood/Veneer Task Manager', sub:'Please select your role',
    admin:'Admin', admin_desc:'Edit, add, delete',
    viewer:'Viewer', viewer_desc:'View only',
    pw_label:'Admin Password', pw_ph:'Enter password',
    submit_admin:'Login as Admin', submit_viewer:'Open as Viewer',
    err:'Incorrect password', viewer_badge:'View Only'
  },
  ru: {
    title:'Менеджер задач Фанера/Шпон', sub:'Выберите роль',
    admin:'Администратор', admin_desc:'Редактировать, добавлять, удалять',
    viewer:'Наблюдатель', viewer_desc:'Только просмотр',
    pw_label:'Пароль администратора', pw_ph:'Введите пароль',
    submit_admin:'Войти как администратор', submit_viewer:'Открыть как наблюдатель',
    err:'Неверный пароль', viewer_badge:'Только просмотр'
  }
};

let authLang = localStorage.getItem('gohankojo-lang') || 'ja';
let authSelectedRole = null; // 'admin' | 'viewer'

function at(k){ return (AUTH_TEXT[authLang]||AUTH_TEXT['ja'])[k]||k; }

function renderAuth(){
  const box = document.getElementById('auth-overlay');
  if(!box) return;

  const pw_area = authSelectedRole==='admin' ? `
    <div class="auth-pw-area">
      <div class="auth-pw-label">${at('pw_label')}</div>
      <input class="auth-pw-input" id="auth-pw" type="password" placeholder="${at('pw_ph')}" maxlength="20"
        onkeydown="if(event.key==='Enter')submitAuth()">
      <div class="auth-pw-error" id="auth-err"></div>
    </div>` : '';
  const submitLabel = authSelectedRole==='admin' ? at('submit_admin')
    : authSelectedRole==='viewer' ? at('submit_viewer') : at('submit_viewer');
  const canSubmit = authSelectedRole !== null;

  box.innerHTML = `
    <div class="auth-box">
      <div class="auth-logo">🏭</div>
      <div class="auth-title">${at('title')}</div>
      <div class="auth-sub">${at('sub')}</div>
      <div class="auth-lang">
        <button class="auth-lang-btn${authLang==='ja'?' on':''}" onclick="setAuthLang('ja')" style="font-size:20px;padding:4px 10px;">🇯🇵</button>
        <button class="auth-lang-btn${authLang==='ru'?' on':''}" onclick="setAuthLang('ru')" style="font-size:20px;padding:4px 10px;">🇷🇺</button>
      </div>
      <div class="auth-role-btns">
        <button class="auth-role-btn${authSelectedRole==='admin'?' selected':''}" onclick="selectRole('admin')">
          <div class="auth-role-icon">🔐</div>
          <div class="auth-role-label">${at('admin')}</div>
          <div class="auth-role-desc">${at('admin_desc')}</div>
        </button>
        <button class="auth-role-btn${authSelectedRole==='viewer'?' selected':''}" onclick="selectRole('viewer')">
          <div class="auth-role-icon">👁️</div>
          <div class="auth-role-label">${at('viewer')}</div>
          <div class="auth-role-desc">${at('viewer_desc')}</div>
        </button>
      </div>
      ${pw_area}
      ${canSubmit?`<button class="auth-submit" onclick="submitAuth()">${submitLabel}</button>`:''}
    </div>`;
  if(authSelectedRole==='admin') setTimeout(()=>document.getElementById('auth-pw')?.focus(),50);
}

function setAuthLang(lang){
  authLang = lang;
  st.lang = lang;
  localStorage.setItem('gohankojo-lang', lang);
  renderAuth();
}

function selectRole(role){
  authSelectedRole = role;
  renderAuth();
}

function submitAuth(){
  if(authSelectedRole === 'viewer'){
    loginAs('viewer');
    return;
  }
  if(authSelectedRole === 'admin'){
    const pw = document.getElementById('auth-pw')?.value || '';
    if(pw === ADMIN_PASS){
      loginAs('admin');
    } else {
      const err = document.getElementById('auth-err');
      if(err){ err.textContent = at('err'); err.style.animation='none'; requestAnimationFrame(()=>err.style.animation=''); }
      document.getElementById('auth-pw').value = '';
      document.getElementById('auth-pw').focus();
    }
  }
}

function loginAs(role){
  authRole = role;
  // 管理者はsessionStorageに保存（タブを閉じるまで有効）
  if(role === 'admin'){
    sessionStorage.setItem(AUTH_SESSION_KEY, 'admin');
  } else {
    sessionStorage.removeItem(AUTH_SESSION_KEY);
  }
  const overlay = document.getElementById('auth-overlay');
  if(overlay){ overlay.style.opacity='0'; overlay.style.transition='opacity .4s'; setTimeout(()=>overlay.remove(),400); }
  if(role === 'viewer'){
    document.body.classList.add('viewer-mode');
  }
  // ヘッダーにバッジ表示
  setTimeout(()=>{
    const logo = document.querySelector('.logo');
    if(logo && role==='viewer'){
      const badge = document.createElement('span');
      badge.className='viewer-badge';
      badge.textContent = at('viewer_badge');
      logo.appendChild(badge);
    }
  }, 500);
  // アプリ初期化：Firebaseから最新データを取得してからrender
  st.lang = authLang;
  fbDb.ref('tasks').once('value').then(snapshot => {
    const raw = snapshot.val();
    if(raw !== null){
      const arr = Array.isArray(raw) ? raw : Object.values(raw);
      const incoming = arr.filter(t => t && t.id);
      if(incoming.length){
        tasks = incoming.map(t => ({
          ...t,
          tags: Array.isArray(t.tags) ? t.tags : [],
          tags_ru: Array.isArray(t.tags_ru) ? t.tags_ru : [],
          subtasks: Array.isArray(t.subtasks) ? t.subtasks.filter(Boolean).map(s=>({...s,title:s.title||'',progress:s.progress||0})) : [],
          assignee: t.assignee || '',
          color: t.color || '#3B82F6',
        }));
        try{ localStorage.setItem(LS_KEY, JSON.stringify(tasks)); }catch(e){}
      }
    }
    render();
  }).catch(() => render());
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
// sessionStorageに管理者セッションがあればログイン画面をスキップ

(function initAuth(){
  // ダークモードをページ読み込み時に即座に適用（チラつき防止）
  applyDarkMode();

  const savedSession = sessionStorage.getItem(AUTH_SESSION_KEY);
  if(savedSession === 'admin'){
    // 管理者として即座に復元（Firebaseから最新データ取得）
    authRole = 'admin';
    authLang = localStorage.getItem('gohankojo-lang') || 'ja';
    st.lang = authLang;
    fbDb.ref('tasks').once('value').then(snapshot => {
      const raw = snapshot.val();
      if(raw !== null){
        const arr = Array.isArray(raw) ? raw : Object.values(raw);
        const incoming = arr.filter(t => t && t.id);
        if(incoming.length){
          tasks = incoming.map(t => ({
            ...t,
            tags: Array.isArray(t.tags) ? t.tags : [],
            tags_ru: Array.isArray(t.tags_ru) ? t.tags_ru : [],
            subtasks: Array.isArray(t.subtasks) ? t.subtasks.filter(Boolean).map(s=>({...s,title:s.title||'',progress:s.progress||0})) : [],
            assignee: t.assignee || '',
            color: t.color || '#3B82F6',
          }));
          try{ localStorage.setItem(LS_KEY, JSON.stringify(tasks)); }catch(e){}
        }
      }
      render();
    }).catch(() => render());
    return;
  }
  // 通常の認証画面表示
  const overlay = document.createElement('div');
  overlay.id = 'auth-overlay';
  overlay.className = 'auth-overlay';
  document.body.appendChild(overlay);
  renderAuth();
})();

// ═══════════════════════════════════════
// FIREBASE 接続状態監視
// ═══════════════════════════════════════
fbDb.ref('.info/connected').on('value', snap => {
  _updateSyncStatus(snap.val() ? 'ok' : 'connecting');
});

// ═══════════════════════════════════════
// FIREBASE リアルタイム同期
// ═══════════════════════════════════════
fbDb.ref('tasks').on('value', (snapshot) => {
  fbReady = true;
  const raw = snapshot.val();

  if(raw === null){
    // Firebaseにデータなし → ローカルデータをアップロード
    fbDb.ref('tasks').set(_cleanForFirebase(tasks))
      .catch(err => console.error('Firebase init upload error:', err));
    return;
  }

  // 配列・オブジェクト両方に対応してtasksを復元
  let incoming;
  if(Array.isArray(raw)){
    incoming = raw.filter(t => t && t.id);
  } else {
    incoming = Object.values(raw).filter(t => t && t.id);
  }
  if(!incoming.length) return;

  // nullになりうる配列フィールドを補正
  tasks = incoming.map(t => ({
    ...t,
    tags: Array.isArray(t.tags) ? t.tags : [],
    tags_ru: Array.isArray(t.tags_ru) ? t.tags_ru : [],
    subtasks: Array.isArray(t.subtasks) ? t.subtasks.filter(Boolean).map(s=>({...s, title:s.title||'', progress:s.progress||0})) : [],
    assignee: t.assignee || '',
    color: t.color || '#3B82F6',
  }));
  try{ localStorage.setItem(LS_KEY, JSON.stringify(tasks)); }catch(e){}

  // モーダルが閉じている場合のみ再レンダリング
  if(authRole && !st.modal) render();

}, err => {
  console.error('Firebase listener error:', err);
  _updateSyncStatus('err');
});
</script>
</body>
</html>
